<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGradient)" rx="20" />
  <rect width="1200" height="400" fill="url(#grid)" rx="20" />

  <!-- Background abstract shapes -->
  <circle cx="1000" cy="100" r="150" fill="#38bdf8" opacity="0.15" filter="url(#glow)" />
  <circle cx="200" cy="300" r="120" fill="#c084fc" opacity="0.15" filter="url(#glow)" />
  
  <!-- Math & Tech Symbols -->
  <path d="M 50 50 L 150 50 L 100 150 Z" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <path d="M 1050 300 Q 1100 200 1150 300" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>
  <text x="100" y="100" font-family="Courier New, monospace" font-size="24" fill="rgba(255,255,255,0.1)">&#x222B; f(x) dx</text>
  <text x="950" y="320" font-family="Courier New, monospace" font-size="24" fill="rgba(255,255,255,0.1)">&#x2211; x_i</text>
  <text x="800" y="80" font-family="Courier New, monospace" font-size="24" fill="rgba(255,255,255,0.1)">E = mc&#x00B2;</text>

  <!-- Main Content -->
  <g transform="translate(600, 180)" text-anchor="middle">
    <text y="-20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="72" font-weight="900" fill="url(#textGradient)" letter-spacing="3">
      IKCEST 2025
    </text>
    <text y="45" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="32" font-weight="600" fill="#f8fafc">
      数学题图像理解 (Math Vision)
    </text>
    <text y="95" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#94a3b8">
      InternVL3.5-2B-Instruct × OpenMath-Nemotron-1.5B | V100 Optimized
    </text>
  </g>
</svg>